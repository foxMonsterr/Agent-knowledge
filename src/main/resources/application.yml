server:
  port: ${SERVER_PORT:18080}

spring:
  application:
    name: smart-agent
  profiles:
    active: dev

  ai:
    vectorstore:
      type: ${VECTOR_STORE_TYPE:simple}

    openai:
      base-url: ${AI_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY:}
      chat:
        options:
          model: ${AI_MODEL:deepseek-v4-flash}
          temperature: 0.7
          max-tokens: 4096

  # 文件上传
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

smart-agent:
  react:
    max-iterations: 6
    tool-timeout-seconds: 15
    stream-heartbeat-seconds: 20
  web:
    provider: mock
    tavily:
      enabled: false
      api-key: ${TAVILY_API_KEY:}

learn-agent:
  react:
    max-iterations: 6
    step-timeout-seconds: 15
    stream-heartbeat-seconds: 20
    auto-create-note: false
    default-strategy: auto
  note:
    max-title-length: 200
    max-content-length: 50000
    auto-summary: true
    chunk-size: 800
    chunk-overlap: 100
    semantic-threshold: 0.5
  quiz:
    default-count: 5
    max-count: 20
    default-difficulty: medium
  flashcard:
    default-count: 10
    sm2:
      default-ease-factor: 2.5
      min-ease-factor: 1.3
      first-interval-days: 1
      second-interval-days: 6
  graph:
    min-edge-weight: 0.3
    max-nodes: 200
    max-edges: 500
  study:
    weakness-threshold: 40
    mastered-threshold: 80
    review-reminder-hour: 9
  upload:
    max-file-size-mb: 20
    allowed-extensions:
      - md
      - txt
      - pdf
      - docx

# Knife4j 文档配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表

logging:
  level:
    com.chat.myAgent: debug
    org.springframework.ai: debug
